<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 720" role="img" aria-labelledby="title desc">
  <title id="title">CM Employee Onboarding App Data Model</title>
  <desc id="desc">Clean data model showing relationships between Teams, Task Data, Task Frames, Users, and Employees.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16a34a"/>
      <stop offset="1" stop-color="#86efac"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d97706"/>
      <stop offset="1" stop-color="#fde68a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="1180" height="720" rx="28" fill="url(#bg)"/>
  <circle cx="96" cy="100" r="160" fill="#35d0c4" opacity="0.08"/>
  <circle cx="1040" cy="620" r="220" fill="#7c3aed" opacity="0.1"/>
  <text x="58" y="72" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="800">CM Employee Onboarding Data Model</text>
  <text x="58" y="112" fill="#94a3b8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">Tables, ownership, task assignment, and employee relationships designed for secure onboarding workflows.</text>

  <g filter="url(#shadow)" font-family="Inter, Segoe UI, Arial, sans-serif">
    <g transform="translate(70 180)">
      <rect width="290" height="172" rx="18" fill="#0f172a" stroke="#a78bfa" stroke-width="2"/>
      <rect width="290" height="56" rx="18" fill="url(#purple)"/>
      <path d="M0 38 H290 V56 H0 Z" fill="url(#purple)"/>
      <text x="145" y="37" text-anchor="middle" fill="#fff" font-size="24" font-weight="800">Teams</text>
      <text x="26" y="90" fill="#f8fafc" font-size="20">Name</text>
      <text x="26" y="124" fill="#f8fafc" font-size="20">Distribution List</text>
      <text x="26" y="158" fill="#f8fafc" font-size="20">Escalation Manager</text>
    </g>

    <g transform="translate(430 282)">
      <rect width="320" height="178" rx="18" fill="#0f172a" stroke="#60a5fa" stroke-width="2"/>
      <rect width="320" height="56" rx="18" fill="url(#blue)"/>
      <path d="M0 38 H320 V56 H0 Z" fill="url(#blue)"/>
      <text x="160" y="37" text-anchor="middle" fill="#fff" font-size="24" font-weight="800">Task Data</text>
      <text x="26" y="92" fill="#f8fafc" font-size="20" font-weight="700">Assigned To</text>
      <text x="26" y="130" fill="#f8fafc" font-size="20" font-weight="700">Assigned Team</text>
      <text x="26" y="168" fill="#f8fafc" font-size="20" font-weight="700">Task Frame</text>
    </g>

    <g transform="translate(196 500)">
      <rect width="295" height="132" rx="18" fill="#0f172a" stroke="#64748b" stroke-width="2"/>
      <rect width="295" height="50" rx="18" fill="#475569"/>
      <path d="M0 34 H295 V50 H0 Z" fill="#475569"/>
      <text x="147.5" y="33" text-anchor="middle" fill="#fff" font-size="23" font-weight="800">Tasks Frame</text>
      <text x="24" y="82" fill="#f8fafc" font-size="19">Task Name</text>
      <text x="24" y="116" fill="#f8fafc" font-size="19" font-weight="700">Owning Team</text>
    </g>

    <g transform="translate(840 205)">
      <rect width="290" height="126" rx="18" fill="#0f172a" stroke="#fbbf24" stroke-width="2"/>
      <rect width="290" height="50" rx="18" fill="url(#gold)"/>
      <path d="M0 34 H290 V50 H0 Z" fill="url(#gold)"/>
      <text x="145" y="34" text-anchor="middle" fill="#111827" font-size="23" font-weight="800">Users</text>
      <text x="24" y="82" fill="#f8fafc" font-size="19">Name</text>
      <text x="24" y="114" fill="#f8fafc" font-size="19">Email</text>
    </g>

    <g transform="translate(840 420)">
      <rect width="290" height="146" rx="18" fill="#0f172a" stroke="#86efac" stroke-width="2"/>
      <rect width="290" height="50" rx="18" fill="url(#green)"/>
      <path d="M0 34 H290 V50 H0 Z" fill="url(#green)"/>
      <text x="145" y="34" text-anchor="middle" fill="#06230e" font-size="23" font-weight="800">Employees</text>
      <text x="24" y="82" fill="#f8fafc" font-size="19">Name</text>
      <text x="24" y="116" fill="#f8fafc" font-size="19" font-weight="700">Hiring Manager</text>
    </g>
  </g>

  <g fill="none" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)" opacity="0.95">
    <path d="M360 245 C420 245 392 330 430 330"/>
    <path d="M360 312 C400 312 388 396 430 396"/>
    <path d="M490 566 C560 566 560 460 615 460"/>
    <path d="M750 338 C805 338 790 268 840 268"/>
    <path d="M985 331 L985 420"/>
    <path d="M840 454 C800 454 805 408 750 408"/>
    <path d="M196 566 C80 566 70 350 70 266 C70 220 84 214 70 214"/>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" fill="#cbd5e1" font-size="15">
    <text x="392" y="232">team owns tasks</text>
    <text x="582" y="550">task frame creates task data</text>
    <text x="762" y="324">assigned user</text>
    <text x="1000" y="382">user profile maps to employee</text>
    <text x="710" y="442">employee context</text>
  </g>
</svg>
