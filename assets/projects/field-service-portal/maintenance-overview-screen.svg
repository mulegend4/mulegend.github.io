  <rect x="244" y="265" width="54" height="28" rx="14" fill="#fef3c7"/>
  <text x="271" y="284" fill="#92400e" font-family="Arial, sans-serif" font-size="10" font-weight="700" text-anchor="middle">Review</text>

  <rect x="34" y="332" width="292" height="74" rx="16" fill="#ffffff" stroke="#d7e0ef"/>
  <circle cx="64" cy="369" r="16" fill="#ecfdf5"/>
  <path d="M56 369l6 6 12-14" fill="none" stroke="#059669" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="92" y="360" fill="#0f172a" font-family="Arial, sans-serif" font-size="13" font-weight="700">Storage and safety</text>
  <text x="92" y="381" fill="#64748b" font-family="Arial, sans-serif" font-size="12">Completed with photos</text>
  <rect x="244" y="355" width="54" height="28" rx="14" fill="#dcfce7"/>
  <text x="271" y="374" fill="#166534" font-family="Arial, sans-serif" font-size="10" font-weight="700" text-anchor="middle">Done</text>

  <rect x="34" y="422" width="292" height="74" rx="16" fill="#ffffff" stroke="#d7e0ef"/>
  <circle cx="64" cy="459" r="16" fill="#fef2f2"/>
  <path d="M64 450v12M64 468h.01" stroke="#ef4444" stroke-width="3" stroke-linecap="round"/>
  <text x="92" y="450" fill="#0f172a" font-family="Arial, sans-serif" font-size="13" font-weight="700">Repair follow-up</text>
  <text x="92" y="471" fill="#64748b" font-family="Arial, sans-serif" font-size="12">1 deficiency pending</text>
  <rect x="244" y="445" width="54" height="28" rx="14" fill="#fee2e2"/>
  <text x="271" y="464" fill="#991b1b" font-family="Arial, sans-serif" font-size="10" font-weight="700" text-anchor="middle">Open</text>

  <rect x="34" y="516" width="136" height="52" rx="16" fill="#ffffff" stroke="#d7e0ef"/>
  <text x="102" y="539" fill="#0f172a" font-family="Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">7</text>
  <text x="102" y="558" fill="#64748b" font-family="Arial, sans-serif" font-size="11" font-weight="700" text-anchor="middle">Photos attached</text>
  <rect x="190" y="516" width="136" height="52" rx="16" fill="#ffffff" stroke="#d7e0ef"/>
  <text x="258" y="539" fill="#0f172a" font-family="Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">2</text>
  <text x="258" y="558" fill="#64748b" font-family="Arial, sans-serif" font-size="11" font-weight="700" text-anchor="middle">Offline saves</text>
  <rect x="34" y="586" width="292" height="32" rx="16" fill="#0f766e"/>
  <text x="180" y="607" fill="#ffffff" font-family="Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle">Continue inspection</text>
