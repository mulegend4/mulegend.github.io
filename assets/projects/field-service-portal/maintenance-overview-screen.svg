<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 640" role="img" aria-labelledby="title desc">
  <title id="title">Maintenance inspection app overview</title>
  <desc id="desc">Clean sample mobile app screen for a store maintenance inspection overview.</desc>
  <defs>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f1f5f9"/>
    </linearGradient>
  </defs>
  <rect width="360" height="640" rx="34" fill="#111827"/>
  <rect x="16" y="18" width="328" height="604" rx="26" fill="#f8fafc"/>
  <rect x="16" y="18" width="328" height="92" rx="26" fill="url(#header)"/>
  <rect x="16" y="76" width="328" height="34" fill="url(#header)"/>
  <text x="34" y="56" fill="#ffffff" font-family="Arial, sans-serif" font-size="18" font-weight="700">Maintenance App</text>
  <text x="34" y="84" fill="#dbeafe" font-family="Arial, sans-serif" font-size="11" font-weight="700">Field inspection overview</text>
  <rect x="238" y="42" width="74" height="28" rx="14" fill="rgba(255,255,255,0.18)"/>
  <circle cx="254" cy="56" r="6" fill="#34d399"/>
  <text x="268" y="60" fill="#ffffff" font-family="Arial, sans-serif" font-size="10" font-weight="700">Online</text>

  <rect x="34" y="132" width="292" height="90" rx="18" fill="url(#card)" stroke="#d7e0ef"/>
  <text x="54" y="162" fill="#0f172a" font-family="Arial, sans-serif" font-size="15" font-weight="700">Store 1042</text>
  <text x="54" y="185" fill="#64748b" font-family="Arial, sans-serif" font-size="12">Exterior and roof inspection</text>
  <rect x="232" y="154" width="76" height="28" rx="14" fill="#ecfdf5"/>
  <text x="270" y="173" fill="#047857" font-family="Arial, sans-serif" font-size="11" font-weight="700" text-anchor="middle">In progress</text>
  <rect x="54" y="200" width="118" height="8" rx="4" fill="#dbeafe"/>
  <rect x="54" y="200" width="74" height="8" rx="4" fill="#2563eb"/>

  <rect x="34" y="242" width="292" height="74" rx="16" fill="#ffffff" stroke="#d7e0ef"/>
  <circle cx="64" cy="279" r="16" fill="#eff6ff"/>
  <path d="M56 284h16M58 276h12l3 8H55l3-8Z" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="92" y="270" fill="#0f172a" font-family="Arial, sans-serif" font-size="13" font-weight="700">Roof condition</text>
