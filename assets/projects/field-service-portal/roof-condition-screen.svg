<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 640" role="img" aria-labelledby="title desc">
  <title id="title">Roof condition inspection screen</title>
  <desc id="desc">Sample mobile app screen for answering roof condition questions during a store maintenance inspection.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#edf3ff"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  <rect width="360" height="640" rx="34" fill="#111827"/>
  <rect x="16" y="18" width="328" height="604" rx="26" fill="url(#bg)"/>
  <rect x="16" y="18" width="328" height="86" rx="26" fill="url(#header)"/>
  <rect x="16" y="74" width="328" height="30" fill="url(#header)"/>
  <text x="34" y="55" fill="#ffffff" font-family="Arial, sans-serif" font-size="18" font-weight="700">Maintenance Inspection</text>
  <text x="34" y="82" fill="#dbeafe" font-family="Arial, sans-serif" font-size="11" font-weight="700">Store 1042 - Roof Review</text>
  <rect x="34" y="126" width="292" height="58" rx="14" fill="#ffffff" stroke="#d7e0ef"/>
  <text x="52" y="151" fill="#0f172a" font-family="Arial, sans-serif" font-size="14" font-weight="700">Inspection Area</text>
  <text x="52" y="170" fill="#64748b" font-family="Arial, sans-serif" font-size="12">Exterior roof and drainage</text>
  <rect x="34" y="204" width="292" height="272" rx="18" fill="#ffffff" stroke="#d7e0ef"/>
  <text x="52" y="235" fill="#0f172a" font-family="Arial, sans-serif" font-size="16" font-weight="700">Condition of roof</text>
  <text x="52" y="258" fill="#64748b" font-family="Arial, sans-serif" font-size="12">Select the most accurate condition.</text>
  <rect x="52" y="286" width="256" height="42" rx="12" fill="#ecfdf5" stroke="#10b981"/>
  <circle cx="72" cy="307" r="9" fill="#10b981"/>
  <path d="M68 307l3 3 6-7" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="92" y="312" fill="#064e3b" font-family="Arial, sans-serif" font-size="13" font-weight="700">Good - no visible concern</text>
  <rect x="52" y="340" width="256" height="42" rx="12" fill="#fff7ed" stroke="#fed7aa"/>
  <circle cx="72" cy="361" r="9" fill="#f59e0b"/>
  <text x="92" y="366" fill="#7c2d12" font-family="Arial, sans-serif" font-size="13" font-weight="700">Monitor - minor repair needed</text>
  <rect x="52" y="394" width="256" height="42" rx="12" fill="#fef2f2" stroke="#fecaca"/>
  <circle cx="72" cy="415" r="9" fill="#ef4444"/>
  <text x="92" y="420" fill="#7f1d1d" font-family="Arial, sans-serif" font-size="13" font-weight="700">Critical - submit repair request</text>
  <rect x="34" y="496" width="292" height="72" rx="16" fill="#ffffff" stroke="#d7e0ef"/>
  <text x="52" y="523" fill="#0f172a" font-family="Arial, sans-serif" font-size="13" font-weight="700">Inspector notes</text>
  <text x="52" y="545" fill="#64748b" font-family="Arial, sans-serif" font-size="12">No visible pooling near rear entrance.</text>
  <rect x="34" y="584" width="292" height="36" rx="18" fill="#0f766e"/>
  <text x="180" y="607" fill="#ffffff" font-family="Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle">Save inspection question</text>
</svg>
