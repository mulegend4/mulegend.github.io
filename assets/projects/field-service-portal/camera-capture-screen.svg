<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 640" role="img" aria-labelledby="title desc">
  <title id="title">Camera capture screen</title>
  <desc id="desc">Sample mobile app screen for attaching a camera photo to a maintenance issue.</desc>
  <defs>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  <rect width="360" height="640" rx="34" fill="#111827"/>
  <rect x="16" y="18" width="328" height="604" rx="26" fill="#f8fafc"/>
  <rect x="16" y="18" width="328" height="86" rx="26" fill="url(#header)"/>
  <rect x="16" y="74" width="328" height="30" fill="url(#header)"/>
  <text x="34" y="55" fill="#ffffff" font-family="Arial, sans-serif" font-size="18" font-weight="700">Attach Evidence</text>
  <text x="34" y="82" fill="#dbeafe" font-family="Arial, sans-serif" font-size="11" font-weight="700">Roof issue - Photo required</text>
  <rect x="34" y="126" width="292" height="260" rx="22" fill="#0f172a"/>
  <rect x="54" y="148" width="252" height="198" rx="16" fill="#1e293b"/>
  <path d="M54 300c35-42 60-50 86-18 16 20 28 22 48 3 30-29 61-22 106 25v36H54v-46Z" fill="#475569"/>
  <circle cx="238" cy="198" r="32" fill="#fbbf24"/>
  <rect x="128" y="358" width="104" height="18" rx="9" fill="#334155"/>
  <circle cx="180" cy="398" r="34" fill="#ffffff"/>
  <circle cx="180" cy="398" r="24" fill="#0f766e"/>
  <path d="M168 398h24M180 386v24" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
  <rect x="34" y="434" width="292" height="78" rx="16" fill="#ffffff" stroke="#d7e0ef"/>
  <text x="52" y="463" fill="#0f172a" font-family="Arial, sans-serif" font-size="14" font-weight="700">Photo checklist</text>
  <text x="52" y="486" fill="#64748b" font-family="Arial, sans-serif" font-size="12">Capture roof area, leak source, and nearby store section.</text>
  <rect x="34" y="532" width="136" height="42" rx="14" fill="#eff6ff" stroke="#bfdbfe"/>
