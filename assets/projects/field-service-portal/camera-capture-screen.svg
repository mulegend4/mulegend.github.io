  <text x="258" y="558" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" font-weight="700" text-anchor="middle">Use camera</text>
  <rect x="34" y="590" width="292" height="12" rx="6" fill="#dbeafe"/>
