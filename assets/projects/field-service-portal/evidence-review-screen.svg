<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 640" role="img" aria-labelledby="title desc">
  <title id="title">Evidence review screen</title>
  <desc id="desc">Sample mobile app screen for reviewing uploaded maintenance photos and submitting a deficiency.</desc>
  <defs>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  <rect width="360" height="640" rx="34" fill="#111827"/>
  <rect x="16" y="18" width="328" height="604" rx="26" fill="#f8fafc"/>
  <rect x="16" y="18" width="328" height="86" rx="26" fill="url(#header)"/>
  <rect x="16" y="74" width="328" height="30" fill="url(#header)"/>
  <text x="34" y="55" fill="#ffffff" font-family="Arial, sans-serif" font-size="18" font-weight="700">Deficiency Review</text>
  <text x="34" y="82" fill="#dbeafe" font-family="Arial, sans-serif" font-size="11" font-weight="700">Offline save ready</text>
